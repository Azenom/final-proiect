<!DOCTYPE html>
<html>

<head>
    <title>Edit Asset</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for message in messages %}
                <div class="flash-message">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <div class="page-header">

        <h1>Edit Asset</h1>

        <a href="/assets/add" class="btn">
            Back to Assets
        </a>

    </div>

    <form method="POST">

        <label>Category:</label>

        <input
            name="category"
            value="{{ asset['category'] }}"
            required
        >

        <br><br>

        <label>Brand:</label>

        <input
            name="brand"
            value="{{ asset['brand'] }}"
            required
        >

        <br><br>

        <label>Serial Number:</label>

        <input
            name="serial_number"
            value="{{ asset['serial_number'] }}"
            required
        >

        <br><br>

        <label>Status:</label>

        <select name="status">

            <option value="Available"
                {% if asset["status"] == "Available" %}
                    selected
                {% endif %}
            >
                Available
            </option>

            <option value="Service"
                {% if asset["status"] == "Service" %}
                    selected
                {% endif %}
            >
                Service
            </option>

        </select>

        <br><br>

        <button type="submit">
            Save Changes
        </button>

    </form>

</div>

</body>
</html>
