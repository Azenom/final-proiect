<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Edit Asset</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

    {% with messages = get_flashed_messages(with_categories=true) %}

        {% if messages %}

            {% for category, message in messages %}

                <div class="flash-message flash-{{ category }}">

                    {{ message }}

                </div>

            {% endfor %}

        {% endif %}

    {% endwith %}

    <div class="page-header">

        <h1>Edit Asset</h1>

        <div class="header-buttons">

            <a href="{{ url_for('add_asset_route') }}"
               class="btn">

                Back to Assets

            </a>

        </div>

    </div>

    <section class="content-section">

        <form method="POST">

            <div class="form-group">

                <label for="category">
                    Category
                </label>

                <input
                    type="text"
                    id="category"
                    name="category"
                    value="{{ asset['category'] }}"
                    required
                >

            </div>

            <div class="form-group">

                <label for="brand">
                    Brand
                </label>

                <input
                    type="text"
                    id="brand"
                    name="brand"
                    value="{{ asset['brand'] }}"
                    required
                >

            </div>

            <div class="form-group">

                <label for="serial_number">
                    Serial Number
                </label>

                <input
                    type="text"
                    id="serial_number"
                    name="serial_number"
                    value="{{ asset['serial_number'] }}"
                    required
                >

            </div>

            <div class="form-group">

                <label for="status">
                    Status
                </label>

                <select
                    id="status"
                    name="status"
                >

                    <option value="Available"
                        {% if asset["status"] == "Available" %}
                            selected
                        {% endif %}
                    >
                        Available
                    </option>

                    <option value="Service"
                        {% if asset["status"] == "Service" %}
                            selected
                        {% endif %}
                    >
                        Service
                    </option>

                </select>

            </div>

            <button type="submit">

                Save Changes

            </button>

        </form>

    </section>

</div>

</body>

</html>
