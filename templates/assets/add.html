<h2>Add Asset</h2>

<form method="POST">
    <label>Category:</label>
    <input type="text" name="category"><br>
    <br>
    <label>Brand:</label>
    <input type="text" name="brand"><br>
    <br>
    <label>Serial Number:</label>
    <input type="text" name="serial_number"><br>
    <br>
    <label>Purchase Date:</label>
    <input type="date" name="purchase_date"><br>
    <br>
    <button type="submit">Add Asset</button>
</form>
    <button onclick="window.location.href='/'">Back to Home</button>

<hr>

<h2>All Assets</h2>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Asset</th>
        <th>Status</th>
        <th>Actions</th>
    </tr>

    {% for asset in assets %}
    <tr>
        <td>{{ asset["id"] }}</td>

        <td>
            {{ asset["category"] }} - {{ asset["brand"] }}<br>
            SN: {{ asset["serial_number"] }}
        </td>

        <td>{{ asset["status"] }}</td>

        <td>
            <a href="/assets/edit/{{ asset['id'] }}">Edit</a> |
            <a href="/assets/delete/{{ asset['id'] }}">Delete</a>
        </td>
    </tr>
    {% endfor %}
</table>
