<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Assign Device</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

    {% with messages = get_flashed_messages(with_categories=true) %}

        {% if messages %}

            {% for category, message in messages %}

                <div class="flash-message flash-{{ category }}">

                    {{ message }}

                </div>

            {% endfor %}

        {% endif %}

    {% endwith %}

    <div class="page-header">

        <h1>Assign Device</h1>

        <div class="header-buttons">

            <a href="{{ url_for('home') }}"
               class="btn">

                Back to Home

            </a>

        </div>

    </div>

    <section class="content-section">

        <form method="POST">

            <div class="form-group">

                <label for="employee_id">
                    Employee
                </label>

                <select
                    id="employee_id"
                    name="employee_id"
                    required
                >

                    {% if employees %}

                        {% for emp in employees %}

                            <option value="{{ emp['id'] }}">

                                {{ emp['first_name'] }}
                                {{ emp['last_name'] }}

                            </option>

                        {% endfor %}

                    {% else %}

                        <option disabled selected>
                            No employees available
                        </option>

                    {% endif %}

                </select>

            </div>

            <div class="form-group">

                <label for="asset_id">
                    Select Available Device
                </label>

                <select
                    id="asset_id"
                    name="asset_id"
                    required
                >

                    {% if assets %}

                        {% for asset in assets %}

                            <option value="{{ asset['id'] }}">

                                {{ asset['category'] }}
                                -
                                {{ asset['brand'] }}

                                (SN:
                                {{ asset['serial_number'] }})

                            </option>

                        {% endfor %}

                    {% else %}

                        <option disabled selected>
                            No available assets
                        </option>

                    {% endif %}

                </select>

            </div>

            <button type="submit">

                Assign

            </button>

        </form>

    </section>

</div>

</body>

</html>
