<!DOCTYPE html>
<html>

<head>
    <title>Assign Device</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for message in messages %}
                <div class="flash-message">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <div class="page-header">

        <h1>Assign Device</h1>

        <a href="/" class="btn">
            Back to Home
        </a>

    </div>

    <form method="POST">

        <label>Employee:</label>

        <select name="employee_id" required>

            {% for emp in employees %}

                <option value="{{ emp['id'] }}">

                    {{ emp['first_name'] }}
                    {{ emp['last_name'] }}

                </option>

            {% endfor %}

        </select>

        <br><br>

        <label>Select Available Device:</label>

        <select name="asset_id" required>

            {% for asset in assets %}

                <option value="{{ asset['id'] }}">

                    {{ asset['category'] }}
                    -
                    {{ asset['brand'] }}

                    (SN: {{ asset['serial_number'] }})

                </option>

            {% endfor %}

        </select>

        <br><br>

        <button type="submit">
            Assign
        </button>

    </form>

</div>

</body>
</html>
