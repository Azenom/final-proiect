<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Edit Employee</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

    {% with messages = get_flashed_messages(with_categories=true) %}

        {% if messages %}

            {% for category, message in messages %}

                <div class="flash-message flash-{{ category }}">

                    {{ message }}

                </div>

            {% endfor %}

        {% endif %}

    {% endwith %}

    <div class="page-header">

        <h1>Edit Employee</h1>

        <div class="header-buttons">

            <a href="{{ url_for('add_employee_route') }}"
               class="btn">

                Back to Employees

            </a>

        </div>

    </div>

    <section class="content-section">

        <form method="POST">

            <div class="form-group">

                <label for="first_name">
                    First Name
                </label>

                <input
                    type="text"
                    id="first_name"
                    name="first_name"
                    value="{{ employee['first_name'] }}"
                    required
                >

            </div>

            <div class="form-group">

                <label for="last_name">
                    Last Name
                </label>

                <input
                    type="text"
                    id="last_name"
                    name="last_name"
                    value="{{ employee['last_name'] }}"
                    required
                >

            </div>

            <div class="form-group">

                <label for="department">
                    Department
                </label>

                <input
                    type="text"
                    id="department"
                    name="department"
                    value="{{ employee['department'] }}"
                >

            </div>

            <button type="submit">

                Save Changes

            </button>

        </form>

    </section>

</div>

</body>

</html>
